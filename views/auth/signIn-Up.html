<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hata mesajı için basit bir animasyon */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-animate { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-6">
            <h2 id="formTitle" class="text-3xl font-bold text-white">Giriş Yap</h2>
            <p id="formSubtitle" class="text-gray-400 mt-2 text-sm">Lütfen bilgilerinizi girin.</p>
        </div>

        <div id="errorMessage" class="hidden error-animate mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/50 text-red-400 text-sm text-center">
            Hatalı e-posta veya şifre!
        </div>

        <div class="space-y-4">
            <div id="nameGroup" class="hidden">
                <label class="block text-gray-300 text-sm mb-1">Ad Soyad</label>
                <input type="text" id="name" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-gray-300 text-sm mb-1">E-posta</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-gray-300 text-sm mb-1">Şifre</label>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <button id="submitBtn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 flex items-center justify-center">
                <span id="btnText">Giriş Yap</span>
                <svg id="btnSpinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </div>

        <div class="mt-6 text-center">
            <button id="toggleBtn" class="text-blue-400 hover:text-blue-300 text-sm font-medium transition">
                Hesabınız yok mu? Kayıt Ol
            </button>
        </div>
    </div>

    <script src="../../src/auth/signIn-Up.js" ></script>
</body>
</html>
